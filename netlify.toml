# Netlify Configuration

[build]
  publish = "."

# Serverless fonksiyonlar (aday başvurusunda CV'yi ek yaparak mail atan submission-created)
# Node 18+ (global fetch); secret'lar Netlify panel ortam değişkenlerinde tutulur.
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Redirect www to non-www
[[redirects]]
  from = "https://www.talevo.com.tr/*"
  to = "https://talevo.com.tr/:splat"
  status = 301
  force = true

# Headers for security and CORS
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), camera=(), microphone=(), payment=(), usb=()"
    
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
